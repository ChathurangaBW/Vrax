<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F7CFF"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F7CFF;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="480" height="120" rx="10" fill="#090B0F"/>
  <rect width="480" height="120" rx="10" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.25"/>

  <!-- Icon -->
  <g transform="translate(18,10)">
    <polygon points="50,8 90,72 10,72"
             fill="url(#g2)" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round"
             filter="url(#glow)"/>
    <polygon points="50,26 72,62 28,62"
             fill="#090B0F" stroke="url(#g1)" stroke-width="1.4" stroke-linejoin="round"/>
    <circle cx="50" cy="50" r="4.5" fill="url(#g1)" filter="url(#glow)"/>
    <line x1="32" y1="56" x2="68" y2="56" stroke="#4F7CFF" stroke-width="0.7" opacity="0.45"/>
    <line x1="38" y1="49" x2="62" y2="49" stroke="#4F7CFF" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- VRAX wordmark -->
  <text x="128" y="64" font-family="'Segoe UI',system-ui,sans-serif" font-size="52"
        font-weight="800" letter-spacing="10" fill="url(#g1)">VRAX</text>

  <!-- Tagline -->
  <text x="130" y="88" font-family="'Cascadia Code','Consolas',monospace" font-size="11"
        letter-spacing="4" fill="#4F7CFF" opacity="0.55">AUTONOMOUS RE AI SWARM</text>
</svg>